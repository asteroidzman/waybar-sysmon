<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3150"/>
      <stop offset="1" stop-color="#171a2b"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe4ee"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a6b"/>
      <stop offset="1" stop-color="#f2603f"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <!-- pins -->
    <g fill="#aeb8d0">
      <rect x="182" y="120" width="18" height="46" rx="6"/>
      <rect x="238" y="120" width="18" height="46" rx="6"/>
      <rect x="294" y="120" width="18" height="46" rx="6"/>
      <rect x="182" y="346" width="18" height="46" rx="6"/>
      <rect x="238" y="346" width="18" height="46" rx="6"/>
      <rect x="294" y="346" width="18" height="46" rx="6"/>
      <rect x="120" y="182" width="46" height="18" rx="6"/>
      <rect x="120" y="238" width="46" height="18" rx="6"/>
      <rect x="120" y="294" width="46" height="18" rx="6"/>
      <rect x="346" y="182" width="46" height="18" rx="6"/>
      <rect x="346" y="238" width="46" height="18" rx="6"/>
      <rect x="346" y="294" width="46" height="18" rx="6"/>
    </g>
    <!-- chip body -->
    <rect x="156" y="156" width="200" height="200" rx="40" fill="url(#cool)"/>
    <!-- core -->
    <rect x="196" y="196" width="120" height="120" rx="26" fill="url(#warm)"/>
    <!-- usage sparkline across the core (cpu/mem activity) -->
    <polyline points="206,272 232,240 258,262 284,214 306,238"
      fill="none" stroke="#ffffff" stroke-opacity="0.92" stroke-width="12"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
